<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>婚礼邀请 Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:"Noto Serif SC",serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* === Loading === */
.loading{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--bg);transition:opacity 0.8s}
.loading.done{opacity:0;pointer-events:none}
.load-spinner{width:24px;height:24px;border:2px solid var(--accent,#D4A574);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite}
.load-text{margin-top:16px;font-size:11px;letter-spacing:3px;opacity:0.4;color:var(--text)}
.load-error{text-align:center;color:var(--text);padding:40px}
.load-error h2{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:300;margin-bottom:12px}
.load-error p{font-size:13px;opacity:0.5;line-height:1.8}

/* === Curtain === */
.curtain{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.curtain-inner{text-align:center;opacity:0;transform:translateY(20px);animation:fadeUp 1.5s 0.3s ease forwards}
.c-line{width:40px;height:1px;background:var(--accent);margin:0 auto 28px;opacity:0.4}
.c-label{font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--text);opacity:0.3;margin-bottom:20px}
.c-names{font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:300;letter-spacing:8px;color:var(--text);margin-bottom:6px}
.c-date{font-size:11px;letter-spacing:5px;color:var(--text);opacity:0.35;margin-bottom:40px}
.c-btn{padding:14px 52px;background:transparent;border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);border-radius:40px;color:var(--text);font-size:12px;letter-spacing:5px;font-family:"Noto Serif SC",serif;cursor:pointer;transition:all 0.6s}
.c-btn:hover{background:color-mix(in srgb,var(--accent) 12%,transparent);border-color:var(--accent)}
.c-btn:active{transform:scale(0.96)}
.curtain.opening{animation:curtainOut 2s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:none}}
@keyframes curtainOut{0%{opacity:1}50%{opacity:1}100%{opacity:0;visibility:hidden;pointer-events:none}}

/* === Ambient Particles === */
.particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.p{position:absolute;border-radius:50%;background:var(--bubble);animation:pFloat linear infinite}
@keyframes pFloat{0%{transform:translateY(105vh) scale(0);opacity:0}8%{opacity:0.8}85%{opacity:0.4}100%{transform:translateY(-8vh) scale(1);opacity:0}}

/* === Light Flares === */
.flare{position:fixed;border-radius:50%;pointer-events:none;z-index:2;filter:blur(45px)}
.flare-1{top:-25%;right:-15%;width:75vw;height:75vw;background:radial-gradient(circle,var(--flare) 0%,transparent 68%);animation:pulse 9s ease-in-out infinite}
.flare-2{bottom:-18%;left:-12%;width:55vw;height:55vw;background:radial-gradient(circle,var(--flare) 0%,transparent 62%);animation:pulse 13s 5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.25;transform:scale(1)}50%{opacity:0.6;transform:scale(1.12)}}

/* === Main Content === */
.main{position:relative;z-index:5;max-width:420px;margin:0 auto;padding:0 0 40px;opacity:0;transform:translateY(28px);transition:all 2s cubic-bezier(0.22,1,0.36,1)}
.main.show{opacity:1;transform:none}

/* === Photo === */
.photo-wrap{position:relative;width:100%;overflow:hidden}
.photo-wrap.has-photo{aspect-ratio:4/3}
.photo-img{width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.06);transition:opacity 2.5s ease,transform 10s ease}
.main.show .photo-img{opacity:1;transform:scale(1)}
.photo-glow{position:absolute;inset:0;background:linear-gradient(135deg,var(--flare) 0%,transparent 55%,color-mix(in srgb,var(--accent) 8%,transparent) 100%);pointer-events:none;opacity:0;transition:opacity 3s 0.8s ease}
.main.show .photo-glow{opacity:1}
.photo-vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 45%,var(--bg) 115%);pointer-events:none}

/* === Card === */
.card{padding:40px 28px;text-align:center}
.anim{opacity:0;transform:translateY(14px);transition:all 1.4s ease}
.main.show .anim{opacity:1;transform:none}
.main.show .d1{transition-delay:0.4s}
.main.show .d2{transition-delay:0.7s}
.main.show .d3{transition-delay:1.0s}
.main.show .d4{transition-delay:1.4s}
.main.show .d5{transition-delay:1.8s}
.main.show .d6{transition-delay:2.2s}
.main.show .d7{transition-delay:2.6s}
.main.show .d8{transition-delay:3.0s}

.ornament{width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto;opacity:0.5}
.names-en{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:300;letter-spacing:5px;line-height:1.35;margin:22px 0 6px}
.names-cn{font-size:15px;letter-spacing:10px;opacity:0.6;margin-bottom:18px}
.date-line{font-family:"Cormorant Garamond",serif;font-size:13px;letter-spacing:3px;opacity:0.45;margin:3px 0}
.venue-name{font-size:14px;font-weight:600;margin-top:18px}
.venue-addr{font-size:11px;opacity:0.45;margin-top:5px;line-height:1.6}
.msg-text{font-size:12px;opacity:0.4;line-height:2.1;margin-top:22px;max-width:260px;margin-left:auto;margin-right:auto;font-style:italic}

/* === Map Buttons === */
.actions{padding:8px 20px 0}
.map-row{display:flex;gap:8px;margin-bottom:8px}
.map-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 8px;background:var(--glow);border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);border-radius:12px;color:var(--text);font-size:12px;text-decoration:none;font-family:"Noto Serif SC",serif;transition:background 0.3s}
.map-btn:active{background:color-mix(in srgb,var(--accent) 25%,transparent)}

/* === RSVP === */
.rsvp{padding:28px 22px;margin:20px 20px 0;background:var(--glow);border:1px solid color-mix(in srgb,var(--accent) 12%,transparent);border-radius:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.rsvp-title{font-family:"Cormorant Garamond",serif;font-size:20px;letter-spacing:4px;text-align:center;margin-bottom:20px;opacity:0.65}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:2.5px;opacity:0.45;margin-bottom:6px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;background:color-mix(in srgb,var(--bg) 70%,transparent);border:1px solid color-mix(in srgb,var(--accent) 15%,transparent);border-radius:10px;color:var(--text);font-size:14px;font-family:"Noto Serif SC",serif;outline:none;transition:border 0.3s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:color-mix(in srgb,var(--accent) 50%,transparent)}
.field select{-webkit-appearance:none;appearance:none}
.field textarea{resize:none;height:64px}
.rsvp-submit{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 80%,#000));color:var(--btn-text,#fff);border:none;border-radius:12px;font-size:14px;font-weight:600;letter-spacing:3px;font-family:"Noto Serif SC",serif;cursor:pointer;transition:transform 0.15s;margin-top:6px}
.rsvp-submit:active{transform:scale(0.97)}
.rsvp-submit:disabled{opacity:0.4}
.rsvp-ok{text-align:center;padding:28px 12px;display:none}
.rsvp-ok .check{font-size:44px;margin-bottom:12px}
.rsvp-ok .ok-text{font-size:14px;line-height:1.9;opacity:0.65}

/* === Footer === */
.footer{text-align:center;padding:36px 20px;font-size:9px;letter-spacing:3px;opacity:0.15}

/* === Music Button === */
.music-btn{position:fixed;bottom:24px;right:18px;z-index:100;width:42px;height:42px;border-radius:50%;background:color-mix(in srgb,var(--accent) 25%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.music-btn.playing{animation:spin 3.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ===== Config =====
var SB_URL = 'https://rfwylubcmglfvtishecc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmd3lsdWJjbWdsZnZ0aXNoZWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MjIxODQsImV4cCI6MjA4NzA5ODE4NH0.5GGtne8q03XTEowIGFjJHRzhdS7NANjPo-l3g9Y-i08';

// ===== Theme Palettes =====
var THEMES = {
  'classic-red':  {bg:'#3D0C0C',text:'#F0DCC8',accent:'#D4A574',glow:'rgba(212,165,116,0.08)',bubble:'rgba(212,165,116,0.07)',flare:'rgba(212,165,116,0.22)',btnText:'#1A0A04'},
  'ink-wash':     {bg:'#1C1915',text:'#E8DDD3',accent:'#8B7355',glow:'rgba(139,115,85,0.08)',bubble:'rgba(139,115,85,0.06)',flare:'rgba(139,115,85,0.15)',btnText:'#fff'},
  'garden':       {bg:'#0F1A0F',text:'#E8E0D6',accent:'#8B9C6B',glow:'rgba(139,156,107,0.08)',bubble:'rgba(139,156,107,0.06)',flare:'rgba(139,156,107,0.15)',btnText:'#fff'},
  'modern':       {bg:'#0A0A0A',text:'#FFFFFF',accent:'#D4A574',glow:'rgba(212,165,116,0.06)',bubble:'rgba(212,165,116,0.05)',flare:'rgba(212,165,116,0.12)',btnText:'#1A0A04'},
  'neo-chinese':  {bg:'#1A0505',text:'#F0DCC8',accent:'#D4A574',glow:'rgba(212,165,116,0.08)',bubble:'rgba(212,165,116,0.06)',flare:'rgba(212,165,116,0.18)',btnText:'#1A0A04'},
  'vintage':      {bg:'#151210',text:'#E8DDD3',accent:'#8B7355',glow:'rgba(139,115,85,0.07)',bubble:'rgba(139,115,85,0.05)',flare:'rgba(139,115,85,0.12)',btnText:'#fff'},
  'film':         {bg:'#0C0C0C',text:'#E8E0D6',accent:'#C8A882',glow:'rgba(200,168,130,0.06)',bubble:'rgba(200,168,130,0.05)',flare:'rgba(200,168,130,0.12)',btnText:'#1A0A04'},
  'minimal':      {bg:'#F5F2EE',text:'#1A1A1A',accent:'#8B8178',glow:'rgba(0,0,0,0.03)',bubble:'rgba(0,0,0,0.02)',flare:'rgba(139,129,120,0.08)',btnText:'#fff'},

};

// ===== Date Formatters =====
function fmtDate(ds){if(!ds)return'';var d=new Date(ds+'T00:00:00');return['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()}
function fmtDateCn(ds){if(!ds)return'';var d=new Date(ds+'T00:00:00');var cn=['〇','一','二','三','四','五','六','七','八','九'];return d.getFullYear().toString().split('').map(function(n){return cn[parseInt(n)]}).join('')+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'}
function fmtTime(ts){if(!ts)return'';var p=ts.split(':'),h=parseInt(p[0]),m=p[1];return(h===0?12:h>12?h-12:h)+':'+m+' '+(h>=12?'PM':'AM')}
function fmtTimeCn(ts){if(!ts)return'';var p=ts.split(':'),h=parseInt(p[0]),m=p[1];var ms=m==='00'?'':m+'分';if(h<12)return'上午'+h+'时'+ms;if(h===12)return'中午12时'+ms;return'下午'+(h-12)+'时'+ms}

// ===== Init =====
async function init() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!id) { showError('缺少邀请 ID'); return; }

  try {
    var res = await fetch(SB_URL + '/rest/v1/invitations?id=eq.' + encodeURIComponent(id) + '&select=*', {
      headers: { 'apikey': SB_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var rows = await res.json();
    if (!rows || rows.length === 0) { showError('邀请函未找到'); return; }
    render(rows[0]);
  } catch(e) {
    showError('加载失败: ' + e.message);
  }
}

function showError(msg) {
  document.body.style.background = '#0A0A0A';
  document.body.style.color = '#E8DDD3';
  document.getElementById('loadScreen').innerHTML = '<div class="load-error"><h2>💌</h2><p>' + msg + '</p></div>';
}

function render(inv) {
  var t = THEMES[inv.template_id] || THEMES['classic-red'];

  // Apply theme CSS variables
  var r = document.documentElement.style;
  r.setProperty('--bg', t.bg);
  r.setProperty('--text', t.text);
  r.setProperty('--accent', t.accent);
  r.setProperty('--glow', t.glow);
  r.setProperty('--bubble', t.bubble);
  r.setProperty('--flare', t.flare);
  r.setProperty('--btn-text', t.btnText);
  document.body.style.background = t.bg;
  document.body.style.color = t.text;

  // Update page title
  document.title = (inv.groom_name||'') + ' & ' + (inv.bride_name||'') + ' 婚礼邀请';

  var dateEn = fmtDate(inv.wedding_date);
  var dateCn = fmtDateCn(inv.wedding_date);
  var timeEn = fmtTime(inv.wedding_time);
  var timeCn = fmtTimeCn(inv.wedding_time);
  var groomEn = inv.groom_name_en || inv.groom_name || '';
  var brideEn = inv.bride_name_en || inv.bride_name || '';
  var addrEnc = encodeURIComponent((inv.venue_name||'') + ' ' + (inv.venue_address||''));

  var html = '';

  // Curtain
  html += '<div class="curtain" id="curtain"><div class="curtain-inner">';
  html += '<div class="c-label">Wedding Invitation</div>';
  html += '<div class="c-line"></div>';
  html += '<div class="c-names">' + groomEn + '</div>';
  html += '<div class="c-names" style="margin-bottom:22px">' + brideEn + '</div>';
  html += '<div class="c-date">' + dateEn + '</div>';
  html += '<button class="c-btn" id="openBtn">打 开 请 柬</button>';
  html += '</div></div>';

  // Particles
  html += '<div class="particles" id="particles"></div>';
  // Flares
  html += '<div class="flare flare-1"></div><div class="flare flare-2"></div>';

  // Main
  html += '<div class="main" id="main">';

  // Photo
  if (inv.photo_url) {
    html += '<div class="photo-wrap has-photo">';
    html += '<img class="photo-img" src="' + inv.photo_url + '" alt="" crossorigin="anonymous">';
    html += '<div class="photo-glow"></div>';
    html += '<div class="photo-vig"></div>';
    html += '</div>';
  }

  // Card content
  html += '<div class="card">';
  html += '<div class="anim d1 ornament"></div>';
  html += '<div class="anim d2 names-en">' + groomEn + '<br>&amp;<br>' + brideEn + '</div>';
  html += '<div class="anim d3 names-cn">' + (inv.groom_name||'') + ' · ' + (inv.bride_name||'') + '</div>';
  html += '<div class="anim d3 ornament"></div>';
  html += '<div class="anim d4 date-line">' + dateCn + '</div>';
  html += '<div class="anim d4 date-line">' + timeCn + (timeEn ? ' · ' + timeEn : '') + '</div>';
  html += '<div class="anim d5 venue-name">📍 ' + (inv.venue_name||'') + '</div>';
  html += '<div class="anim d5 venue-addr">' + (inv.venue_address||'') + '</div>';
  if (inv.message) {
    html += '<div class="anim d6 ornament" style="margin-top:22px"></div>';
    html += '<div class="anim d6 msg-text">' + inv.message.replace(/\n/g,'<br>') + '</div>';
  }
  html += '</div>';

  // Maps
  html += '<div class="actions anim d7"><div class="map-row">';
  html += '<a class="map-btn" href="https://maps.apple.com/?daddr=' + addrEnc + '" target="_blank">📍 Apple Maps</a>';
  html += '<a class="map-btn" href="https://www.google.com/maps/dir/?api=1&destination=' + addrEnc + '" target="_blank">🗺️ Google Maps</a>';
  html += '</div></div>';

  // RSVP
  html += '<div class="rsvp anim d8" id="rsvpSection">';
  html += '<div class="rsvp-title">R  S  V  P</div>';
  html += '<div id="rsvpForm">';
  html += '<div class="field"><label>姓名 Name *</label><input type="text" id="rName" placeholder="您的姓名"></div>';
  html += '<div class="field"><label>出席 Attendance *</label><select id="rAttend"><option value="">请选择 Please select</option><option value="confirmed">✅ 出席 Will Attend</option><option value="maybe">🤔 待定 Maybe</option><option value="declined">❌ 无法出席 Cannot Attend</option></select></div>';
  html += '<div class="field"><label>同行人数 Plus</label><select id="rPlus"><option value="0">仅本人 Just me</option><option value="1">+1</option><option value="2">+2</option><option value="3">+3</option></select></div>';
  html += '<div class="field"><label>饮食需求 Dietary</label><select id="rDiet"><option value="">无特殊要求 None</option><option value="vegetarian">素食 Vegetarian</option><option value="vegan">纯素 Vegan</option><option value="halal">清真 Halal</option><option value="gluten_free">无麸质 Gluten-free</option></select></div>';
  html += '<div class="field"><label>祝福留言 Message</label><textarea id="rMsg" placeholder="送上祝福 Best wishes..."></textarea></div>';
  html += '<button class="rsvp-submit" id="rsvpBtn">提交回执 SUBMIT</button>';
  html += '</div>';
  html += '<div class="rsvp-ok" id="rsvpOk"><div class="check">💌</div><div class="ok-text" id="okMsg"></div></div>';
  html += '</div>';

  html += '<div class="footer">XISHI · 喜式 · Creative Celebration Platform</div>';
  html += '</div>';

  // Music button
  html += '<div class="music-btn" id="musicBtn" style="' + (musicStyle === 'none' ? 'display:none' : '') + '">🎵</div>';

  document.getElementById('app').innerHTML = html;

  // Hide loader
  document.getElementById('loadScreen').classList.add('done');
  setTimeout(function(){ document.getElementById('loadScreen').style.display = 'none'; }, 800);

  // === Wire Events ===
  document.getElementById('openBtn').addEventListener('click', function() {
    document.getElementById('curtain').classList.add('opening');
    setTimeout(function() {
      document.getElementById('main').classList.add('show');
      makeParticles();
      startMusic();
    }, 600);
  });

  document.getElementById('musicBtn').addEventListener('click', toggleMusic);

  document.getElementById('rsvpBtn').addEventListener('click', function() {
    submitRsvp(inv.id, inv.client_id);
  });
}

// ===== Particles =====
function makeParticles() {
  var c = document.getElementById('particles');
  if (!c) return;
  for (var i = 0; i < 20; i++) {
    var p = document.createElement('div');
    p.className = 'p';
    var s = Math.random() * 18 + 3;
    p.style.width = s + 'px';
    p.style.height = s + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (Math.random() * 14 + 10) + 's';
    p.style.animationDelay = (Math.random() * 16) + 's';
    c.appendChild(p);
  }
}

// ===== Music (Multi-style Web Audio) =====
var actx = null, musicPlaying = false, musicNodes = [], melodyTimer = null, padTimer = null;
var musicStyle = new URLSearchParams(window.location.search).get('music') || 'piano';

function startMusic() {
  if (musicStyle === 'none') return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    musicPlaying = true;
    var btn = document.getElementById('musicBtn');
    if (btn) btn.classList.add('playing');
    if (musicStyle === 'piano') { pianoPad(); pianoMelody(); }
    else if (musicStyle === 'musicbox') { musicboxPlay(); }
    else if (musicStyle === 'harp') { harpPlay(); }
    else { pianoPad(); pianoMelody(); }
  } catch(e) {}
}

// --- Piano: warm C major arpeggios ---
function pianoPad() {
  if (!actx || !musicPlaying) return;
  var freqs = [261.6, 329.6, 392.0, 523.3];
  var t = actx.currentTime;
  freqs.forEach(function(f) {
    var o = actx.createOscillator(); var g = actx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.01, t + 3);
    g.gain.setValueAtTime(0.01, t + 20);
    g.gain.linearRampToValueAtTime(0, t + 25);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 25); musicNodes.push(o);
  });
  padTimer = setTimeout(function(){ if(musicPlaying) pianoPad(); }, 23000);
}

function pianoMelody() {
  if (!actx || !musicPlaying) return;
  // Gentle wedding waltz in C major
  var notes = [523,494,440,392,440,494,523,0, 587,523,494,440,392,440,494,523, 659,587,523,494,440,392,440,523];
  var t = actx.currentTime + 0.5;
  notes.forEach(function(f, i) {
    if (f === 0) return;
    var o = actx.createOscillator(); var g = actx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    var start = t + i * 0.6;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.035, start + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.55);
    o.connect(g); g.connect(actx.destination);
    o.start(start); o.stop(start + 0.58); musicNodes.push(o);
  });
  melodyTimer = setTimeout(function(){ if(musicPlaying) pianoMelody(); }, notes.length * 600 + 4000);
}

// --- Music Box: light tinkly melody ---
function musicboxPlay() {
  if (!actx || !musicPlaying) return;
  var notes = [784,659,784,988,784,659,523,587, 659,784,659,523,440,523,587,659, 784,988,1047,988,784,659,523,587];
  var t = actx.currentTime + 0.2;
  notes.forEach(function(f, i) {
    var o = actx.createOscillator(); var g = actx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    var start = t + i * 0.35;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.04, start + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
    o.connect(g); g.connect(actx.destination);
    o.start(start); o.stop(start + 0.35); musicNodes.push(o);
  });
  melodyTimer = setTimeout(function(){ if(musicPlaying) musicboxPlay(); }, notes.length * 350 + 3000);
}

// --- Harp: flowing arpeggios ---
function harpPlay() {
  if (!actx || !musicPlaying) return;
  var chords = [
    [262,330,392,523,659,784],
    [220,330,440,523,659,880],
    [247,330,392,494,587,784],
    [262,330,392,523,659,784]
  ];
  var t = actx.currentTime + 0.3;
  chords.forEach(function(chord, ci) {
    chord.forEach(function(f, ni) {
      var o = actx.createOscillator(); var g = actx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      var start = t + ci * 2.4 + ni * 0.15;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.03, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, start + 1.8);
      o.connect(g); g.connect(actx.destination);
      o.start(start); o.stop(start + 2.0); musicNodes.push(o);
    });
  });
  melodyTimer = setTimeout(function(){ if(musicPlaying) harpPlay(); }, chords.length * 2400 + 2000);
}

function toggleMusic() {
  if (musicPlaying) {
    musicPlaying = false;
    var btn = document.getElementById('musicBtn');
    if (btn) btn.classList.remove('playing');
    clearTimeout(padTimer); clearTimeout(melodyTimer);
    musicNodes.forEach(function(o) { try { o.stop(); } catch(e) {} });
    musicNodes = [];
    if (actx) { actx.close(); actx = null; }
  } else {
    startMusic();
  }
}

// ===== RSVP =====
async function submitRsvp(invId, clientId) {
  var name = document.getElementById('rName').value.trim();
  var attend = document.getElementById('rAttend').value;
  if (!name) { alert('请输入姓名 Please enter your name'); return; }
  if (!attend) { alert('请选择出席 Please select attendance'); return; }

  var btn = document.getElementById('rsvpBtn');
  btn.disabled = true; btn.textContent = '提交中...';

  var status = attend === 'confirmed' ? 'confirmed' : attend === 'declined' ? 'declined' : 'later';

  try {
    var payload = {
        invitation_id: invId || 'unknown',
        client_id: (clientId && clientId.length > 10) ? clientId : null,
        guest_name: name,
        status: status,
        plus_ones: parseInt(document.getElementById('rPlus').value) || 0,
        dietary: document.getElementById('rDiet').value || null,
        message: document.getElementById('rMsg').value.trim() || null
    };
    console.log('[RSVP] Submitting:', JSON.stringify(payload));
    var res = await fetch(SB_URL + '/rest/v1/invitation_rsvp', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      var errText = await res.text();
      console.error('[RSVP] FAIL:', res.status, errText);
      throw new Error('HTTP ' + res.status + ': ' + errText);
    }
    console.log('[RSVP] OK');

    document.getElementById('rsvpForm').style.display = 'none';
    var ok = document.getElementById('rsvpOk');
    ok.style.display = 'block';
    var msg = attend === 'confirmed'
      ? '感谢 ' + name + '！<br>我们期待您的到来 🎉<br>Thank you! See you there!'
      : attend === 'declined'
      ? '感谢 ' + name + ' 的回复<br>遗憾您无法出席 💝<br>We will miss you!'
      : '收到 ' + name + '<br>我们会再次通知您 📩<br>We will reach out again!';
    document.getElementById('okMsg').innerHTML = msg;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '提交回执 SUBMIT';
    alert('提交失败，请重试 Submission failed\n\n' + (e.message || e));
  }
}
